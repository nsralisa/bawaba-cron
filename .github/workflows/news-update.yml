name: Update News Feed

on:
  schedule:
    # Every 5 minutes — the GitHub Actions documented minimum for
    # scheduled workflows. Public-repo runners are free + unlimited,
    # so we maximize freshness. GitHub does NOT guarantee exact
    # 5-min intervals; runs may queue several minutes longer during
    # peak load, which is fine for our use case.
    - cron: '*/5 * * * *'
  workflow_dispatch: {} # Manual trigger from the GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Fetch and upsert news items
        run: bun run scripts/news-fetch.ts
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

name: Update News Feed

on:
  # Trigger source: cron-job.org POSTs to this workflow's /dispatches
  # endpoint every 5 minutes. We tried GitHub's native `schedule:`
  # event first (commit cb83da0) but it dropped most ticks under
  # load — only firing 2× in 3 hours during testing. workflow_dispatch
  # is reliable because GitHub treats it as user-initiated and
  # processes it immediately, every time.
  #
  # If cron-job.org goes down: trigger manually here, or restore
  # `schedule: - cron: '*/5 * * * *'` as a fallback.
  workflow_dispatch: {}

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Fetch and upsert news items
        run: bun run scripts/news-fetch.ts
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

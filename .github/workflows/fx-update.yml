name: Update FX Rates

on:
  schedule:
    # Every 5 minutes — the GitHub Actions documented minimum.
    # sp-today only updates a few times daily so most pulls will
    # upsert no-ops (same values), but the dedup is cheap and
    # surfacing a rate change ~5 min after it happens beats
    # waiting for the next 30-min tick.
    - cron: '*/5 * * * *'
  workflow_dispatch: {}  # Manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Fetch and upsert rates
        run: bun run scripts/fx-fetch.ts
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
